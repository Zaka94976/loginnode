name: Build and deploy Node.js app to Azure Web App - my-nodejs-lo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Validate JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Prepare deployment package
        run: |
          mkdir -p release
          cp package.json package-lock.json release/
          cp -r src release/src
          cp -r node_modules release/node_modules

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E6B8BFEE3F8B4C93BEFB97A77BD75D05 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F50DAB0BB3A248F39189D4C6DDAE1BD2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_98177F6D7BA143FCA3B0998EB480E991 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: my-nodejs-lo
          slot-name: Production
          package: ./release
          startup-command: npm start
